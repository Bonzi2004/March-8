<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NARKOT // SUPREME EUPHORIA</title>
    <!-- 
        ENGINE CORE: THREE.JS + GSAP + TAILWIND
        DEVELOPERS: MATVEY & ARTYOM
        RELEASE: MARCH 8 SPECIAL
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;700;900&family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --primary: #ff2d75;
            --secondary: #bc13fe;
            --dark: #050005;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        body, html {
            width: 100%; height: 100%;
            background: var(--dark);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #webgl-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* --- UI LAYER --- */
        #app-interface {
            position: relative;
            z-index: 10;
            width: 100%; height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.4) 100%);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- LOGO & DEVS --- */
        .header-box {
            text-align: center;
            margin-bottom: 60px;
        }

        .dev-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 8px;
            letter-spacing: 5px;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        .main-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .studio-name {
            font-size: 10px;
            letter-spacing: 8px;
            color: #444;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* --- CARDS GRID --- */
        .girls-grid {
            width: 100%;
            display: grid;
            grid-template-cols: 1fr;
            gap: 12px;
        }

        .card {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            cursor: pointer;
        }

        .card:hover, .card:active {
            background: rgba(255, 45, 117, 0.08);
            border-color: var(--primary);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        .card-id {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .card-name {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* --- SPECIAL BUTTON --- */
        .all-access-btn {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 15px 45px rgba(255, 140, 0, 0.3);
            cursor: pointer;
            transition: 0.4s;
        }

        .all-access-btn:active {
            transform: scale(0.95);
        }

        .all-access-btn h3 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 4px;
            color: #000;
        }

        /* --- MODAL SYSTEM --- */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .m-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 0 40px var(--primary);
        }

        .m-body {
            font-size: 18px;
            line-height: 1.8;
            font-weight: 300;
            color: #ccc;
            margin-bottom: 40px;
        }

        .close-trigger {
            padding: 15px 40px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 100px;
            font-size: 12px;
            letter-spacing: 5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-trigger:hover {
            border-color: #fff;
            background: #fff;
            color: #000;
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    </style>
</head>
<body>

    <div class="loading-screen" id="loader">
        <div class="text-center">
            <div class="orbitron text-white text-[10px] tracking-[10px] mb-4">INITIALIZING ENGINE</div>
            <div class="w-48 h-[1px] bg-white/10 relative overflow-hidden">
                <div id="load-bar" class="absolute top-0 left-0 h-full bg-pink-500 w-0"></div>
            </div>
        </div>
    </div>

    <canvas id="webgl-canvas"></canvas>

    <div id="app-interface">
        <div class="container">
            
            <header class="header-box">
                <div class="dev-tag">ENGINE BY MATVEY & ARTYOM</div>
                <h1 class="main-logo">EUPHORIA</h1>
                <div class="studio-name">NARKOT STUDIO</div>
            </header>

            <div class="girls-grid" id="main-grid">
                <div class="all-access-btn" onclick="openWish('ДЛЯ ВСЕХ ВАС', 'Вы — душа нашего класса. Каждая из вас привносит в этот мир свой уникальный свет. Мы ценим вашу доброту, ум и красоту. Сияйте ярко, и пусть все ваши мечты сбываются по щелчку пальцев! С 8 марта!')">
                    <h3>🌟 SPECIAL ACCESS</h3>
                </div>
                <!-- JS will inject cards here -->
            </div>

            <footer class="mt-20 text-center opacity-20 text-[8px] tracking-[5px] uppercase">
                System Build: 03.2025 // No Limits
            </footer>

        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <h2 class="m-title" id="m-name">NAME</h2>
            <p class="m-body" id="m-text">TEXT</p>
            <div class="close-trigger" onclick="closeWish()">ЗАКРЫТЬ</div>
            <div class="mt-20 opacity-30 text-[7px] tracking-[5px] uppercase">
                Product of Matvey & Artyom Collaboration
            </div>
        </div>
    </div>

    <script>
        /**
         * ENGINE CORE - WRITTEN BY MATVEY & ARTYOM SPECIALIST
         * SYSTEM: SUPREME EUPHORIA
         */

        const girlsData = [
            { id: "01", name: "Ангелина", wish: "Ангелина, ты как ангел нашего класса. Желаю тебе всегда сохранять ту невероятную легкость и доброту, которая в тебе есть. Сияй!" },
            { id: "02", name: "Айлана", wish: "Айлана, в твоем имени звучит магия. Желаю тебе самых ярких открытий и верных друзей. Пусть жизнь будет как красивая сказка." },
            { id: "03", name: "Кира", wish: "Кира, твоя харизма — это нечто! Желаю тебе всегда быть в центре внимания и достигать любых, даже самых дерзких целей." },
            { id: "04", name: "Мария", wish: "Мария, ты воплощение женственности и мудрости. Желаю тебе бесконечного тепла, вдохновения и весеннего настроения каждый день." },
            { id: "05", name: "Алиса", wish: "Алиса, желаю тебе жизни, полной чудес. Пусть твоя любознательность и острый ум ведут тебя к самым вершинам успеха." },
            { id: "06", name: "Кристина", wish: "Кристина, ты невероятно стильная и яркая. Желаю тебе всегда оставаться собой и ловить восхищенные взгляды всего мира." },
            { id: "07", name: "Полина", wish: "Полина, твоя доброта согревает всех вокруг. Желаю тебе встретить эту весну с открытым сердцем и получить миллион подарков судьбы." },
            { id: "08", name: "Манижа", wish: "Манижа, ты настоящая жемчужина. Желаю тебе абсолютной уверенности в себе и чтобы твои глаза всегда светились только от радости." },
            { id: "09", name: "Алена Теремова", wish: "Алена, ты очень целеустремленная и крутая. Желаю тебе исполнить все свои заветные мечты и оставаться такой же замечательной." },
            { id: "10", name: "Иванна Вакульчук", wish: "Иванна, ты уникальная личность. Желаю тебе найти свой путь к успеху, окружать себя лучшими людьми и цвести ярче всех цветов." },
            { id: "11", name: "Полина К.", wish: "Полина, ты безумно талантливая. Желаю тебе бесконечного вдохновения, веры в свои силы и самой нежной весны!" }
        ];

        // --- WEBGL RENDERING ENGINE ---
        let scene, camera, renderer, clock;
        let particles, hearts = [];
        let mouse = new THREE.Vector2(0, 0);

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('webgl-canvas'),
                antialias: true, 
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // STARFIELD SYSTEM
            const pGeo = new THREE.BufferGeometry();
            const pCount = 2000;
            const pos = new Float32Array(pCount * 3);
            const sizes = new Float32Array(pCount);
            
            for(let i=0; i<pCount*3; i++) pos[i] = (Math.random() - 0.5) * 30;
            for(let i=0; i<pCount; i++) sizes[i] = Math.random();
            
            pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            pGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const pMat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.05,
                transparent: true,
                opacity: 0.3,
                blending: THREE.AdditiveBlending
            });
            particles = new THREE.Points(pGeo, pMat);
            scene.add(particles);

            // 3D HEART GEOMETRY
            const heartShape = new THREE.Shape();
            heartShape.moveTo(0.25, 0.25);
            heartShape.bezierCurveTo(0.25, 0.25, 0.2, 0, 0, 0);
            heartShape.bezierCurveTo(-0.3, 0, -0.3, 0.35, -0.3, 0.35);
            heartShape.bezierCurveTo(-0.3, 0.55, -0.1, 0.77, 0.25, 0.95);
            heartShape.bezierCurveTo(0.6, 0.77, 0.8, 0.55, 0.8, 0.35);
            heartShape.bezierCurveTo(0.8, 0.35, 0.8, 0, 0.5, 0);
            heartShape.bezierCurveTo(0.35, 0, 0.25, 0.25, 0.25, 0.25);

            const heartGeo = new THREE.ExtrudeGeometry(heartShape, { depth: 0.1, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05 });
            
            for(let i=0; i<50; i++) {
                const mat = new THREE.MeshPhongMaterial({ 
                    color: 0xff2d75, 
                    shininess: 100, 
                    specular: 0xffffff,
                    transparent: true,
                    opacity: 0.6
                });
                const h = new THREE.Mesh(heartGeo, mat);
                resetHeart(h);
                hearts.push(h);
                scene.add(h);
            }

            const light = new THREE.PointLight(0xffffff, 2, 50);
            light.position.set(0, 5, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 0.5));

            renderLoop();
        }

        function resetHeart(h) {
            h.position.set((Math.random()-0.5)*15, 8 + Math.random()*10, (Math.random()-0.5)*10);
            h.rotation.x = Math.PI;
            h.rotation.y = Math.random() * Math.PI;
            h.scale.set(0,0,0);
            const s = 0.2 + Math.random() * 0.4;
            gsap.to(h.scale, {x: s, y: s, z: s, duration: 1.5, ease: "back.out(2)"});
            h.userData = { speed: 0.02 + Math.random() * 0.05, rot: (Math.random()-0.5) * 0.04 };
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const time = clock.getElapsedTime();

            particles.rotation.y += 0.0005;
            particles.position.y = Math.sin(time * 0.5) * 0.2;

            hearts.forEach(h => {
                h.position.y -= h.userData.speed;
                h.rotation.z += h.userData.rot;
                h.position.x += Math.sin(time + h.position.y) * 0.005;
                if(h.position.y < -10) resetHeart(h);
            });

            // Interactive Camera
            camera.position.x += (mouse.x * 2 - camera.position.x) * 0.05;
            camera.position.y += (-mouse.y * 2 - camera.position.y) * 0.05;
            camera.lookAt(0,0,0);

            renderer.render(scene, camera);
        }

        // --- INTERFACE LOGIC ---
        function buildGrid() {
            const grid = document.getElementById('main-grid');
            girlsData.forEach(g => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-id">TARGET_${g.id}</div>
                    <div class="card-name">${g.name}</div>
                    <div class="absolute right-6 bottom-6 opacity-10">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    </div>
                `;
                card.onclick = () => openWish(g.name, g.wish);
                grid.appendChild(card);
            });
        }

        function openWish(name, text) {
            const modal = document.getElementById('modal-overlay');
            document.getElementById('m-name').innerText = name;
            document.getElementById('m-text').innerText = text;
            modal.style.display = 'flex';
            gsap.fromTo(modal, {opacity: 0, scale: 1.1, backdropFilter: "blur(0px)"}, {opacity: 1, scale: 1, backdropFilter: "blur(15px)", duration: 0.6, ease: "expo.out"});
            
            // Hyper speed for hearts
            hearts.forEach(h => {
                gsap.to(h.userData, {speed: h.userData.speed * 8, duration: 1});
                gsap.to(h.material.color, {r: 1, g: 0.9, b: 0, duration: 0.5});
            });
        }

        function closeWish() {
            const modal = document.getElementById('modal-overlay');
            gsap.to(modal, {opacity: 0, scale: 0.9, duration: 0.4, onComplete: () => {
                modal.style.display = 'none';
            }});
            hearts.forEach(h => {
                gsap.to(h.userData, {speed: h.userData.speed / 8, duration: 1.5});
                gsap.to(h.material.color, {r: 1, g: 0.17, b: 0.45, duration: 1});
            });
        }

        // --- LOAD SEQUENCE ---
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = (e.clientY / window.innerHeight) * 2 - 1;
        });

        window.addEventListener('touchstart', (e) => {
            mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            mouse.y = (e.touches[0].clientY / window.innerHeight) * 2 - 1;
        });

        window.onload = () => {
            init3D();
            buildGrid();
            
            gsap.to("#load-bar", {width: "100%", duration: 2, ease: "power2.inOut", onComplete: () => {
                gsap.to("#loader", {opacity: 0, duration: 0.8, onComplete: () => {
                    document.getElementById('loader').remove();
                }});
            }});
        };

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
