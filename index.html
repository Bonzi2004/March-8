<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>5-З LEGACY // ARCHITECT MATVEY</title>
    
    <!-- 
        ================================================================================
        ARCHITECT: MATVEY (5-Z)
        VERSION: 2026.SUPREME.FINAL
        ENGINE: CORE-WEBGL-V3 + GSAP-ULTRA
        FEATURES: GYRO-SENSE, TOUCH-FLOW, SHADER-MORPHING
        CHANGELOG: REMOVED MARINA ALEXANDROVNA, OPTIMIZED GRID
        ================================================================================
    -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,500;1,700&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap');

        :root {
            --bg: #030303;
            --gold: #e5c47a;
            --pink: #ff8fa3;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            touch-action: none;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
            width: 100vw;
            height: 100vh;
        }

        /* --- LOADING OVERLAY --- */
        #loading-screen {
            position: fixed; inset: 0; z-index: 10000;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .load-title {
            font-family: 'Cormorant Garamond', serif; font-size: 3rem;
            font-style: italic; letter-spacing: -1px;
        }
        .load-brand {
            font-size: 8px; letter-spacing: 10px; color: var(--gold); font-weight: 900;
            text-transform: uppercase; margin-top: 10px;
        }
        .progress-wrap {
            width: 200px; height: 1px; background: rgba(255,255,255,0.1);
            margin-top: 40px; overflow: hidden;
        }
        #progress-bar { width: 0%; height: 100%; background: var(--gold); }

        /* --- CANVAS --- */
        #gl-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .vignette {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.85) 100%);
        }

        /* --- SCROLL ENGINE --- */
        #scroll-container {
            position: absolute; top: 0; left: 0; width: 100%;
            z-index: 10; will-change: transform; padding-bottom: 25vh;
        }

        /* --- TYPOGRAPHY --- */
        .h-large {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.5rem, 12vw, 10rem);
            font-style: italic; font-weight: 300;
            line-height: 0.85; letter-spacing: -2px;
        }
        .label-upper {
            font-size: 10px; font-weight: 800; letter-spacing: 6px;
            text-transform: uppercase; color: var(--gold);
        }

        /* --- GRID --- */
        .content-section { padding: 12vh 6vw; }
        .grid-master {
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px;
        }

        /* --- CARDS --- */
        .card-p {
            grid-column: span 6; background: var(--glass);
            border: 1px solid var(--border); border-radius: 2px;
            padding: 50px 40px; position: relative; overflow: hidden;
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
        }
        @media (max-width: 850px) { .card-p { grid-column: span 12; } }

        .card-p:hover {
            border-color: var(--gold); background: rgba(255,255,255,0.07);
            transform: translateY(-8px);
        }
        .card-index { font-size: 8px; opacity: 0.3; margin-bottom: 15px; display: block; letter-spacing: 3px; font-weight: 900; }
        .card-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 2.8rem); font-style: italic; line-height: 1.1; }
        .card-sub { font-size: 9px; letter-spacing: 4px; color: var(--gold); margin-top: 15px; font-weight: 700; text-transform: uppercase; }

        /* --- GIRLS --- */
        .card-girl {
            grid-column: span 4; padding: 40px; border: 1px solid var(--border);
            text-align: center; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (max-width: 1024px) { .card-girl { grid-column: span 6; } }
        @media (max-width: 640px) { .card-girl { grid-column: span 12; } }

        .card-girl:hover { border-color: var(--pink); background: rgba(255, 143, 163, 0.04); transform: scale(1.02); }

        /* --- MODAL --- */
        #modal-sys {
            position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            opacity: 0;
        }
        .m-content { max-width: 700px; width: 90%; text-align: center; }
        .m-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 8vw, 4.5rem); font-style: italic; color: #fff; }
        .m-desc { font-size: 1.1rem; font-weight: 300; line-height: 1.8; color: #ccc; margin: 40px 0; }
        .m-btn {
            border: 1px solid var(--gold); color: var(--gold); padding: 20px 60px;
            font-size: 10px; font-weight: 900; letter-spacing: 6px; text-transform: uppercase;
            cursor: pointer; transition: 0.4s;
        }
        .m-btn:hover { background: var(--gold); color: #000; }

        #cursor {
            width: 25px; height: 25px; border: 1px solid var(--gold);
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 9999; transform: translate(-50%, -50%); display: none;
            mix-blend-mode: difference;
        }
        @media (hover: hover) { #cursor { display: block; } }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="load-title">Matvey architecture</div>
        <div class="load-brand">Supreme 5-Z Legacy</div>
        <div class="progress-wrap"><div id="progress-bar"></div></div>
    </div>

    <div id="cursor"></div>
    <div class="vignette"></div>
    <canvas id="gl-canvas"></canvas>

    <div id="scroll-container">
        
        <section class="hero flex flex-col items-center justify-center min-h-screen text-center px-6">
            <div class="label-upper mb-8 opacity-0" id="hero-tag">Supreme Spring MMXXVI</div>
            <h1 class="h-large opacity-0" id="hero-main">Architectural<br>Respect</h1>
            <div class="mt-20 flex flex-col items-center opacity-0" id="hero-scroll">
                <div class="w-[1px] h-24 bg-gradient-to-b from-gold to-transparent"></div>
                <div class="text-[8px] uppercase tracking-[8px] mt-6 opacity-30">Slide to Discover</div>
            </div>
        </section>

        <section class="content-section">
            <div class="max-w-7xl mx-auto">
                <div class="mb-20 border-l border-gold pl-10">
                    <div class="label-upper mb-4">Phase 01 // Mentors</div>
                    <h2 class="h-large text-[4.5rem]">The Elite Staff</h2>
                </div>
                <div class="grid-master" id="teachers-target"></div>
            </div>
        </section>

        <section class="content-section">
            <div class="max-w-7xl mx-auto">
                <div class="mb-20 text-right border-r border-pink-400 pr-10">
                    <div class="label-upper mb-4" style="color:var(--pink)">Phase 02 // Diamonds</div>
                    <h2 class="h-large text-[4.5rem]">Ladies of 5-З</h2>
                </div>
                <div class="grid-master" id="girls-target"></div>
            </div>
        </section>

        <footer class="text-center py-40 border-t border-white/5">
            <div class="load-brand mb-10">MATVEY DESIGN STUDIO</div>
            <div class="text-[9px] opacity-25 tracking-[10px] uppercase">Built for Excellence</div>
        </footer>

    </div>

    <div id="modal-sys" onclick="closeModal()">
        <div class="m-content" onclick="event.stopPropagation()">
            <div class="label-upper text-gold mb-8">Personal Dedication</div>
            <h3 class="m-title" id="m-name">Name</h3>
            <p class="m-desc" id="m-text">Text...</p>
            <div class="m-btn" onclick="closeModal()">Dismiss</div>
        </div>
    </div>

    <script id="v-shader" type="x-shader/x-vertex">
        varying vec2 vUv;
        varying float vNoise;
        uniform float uTime;
        void main() {
            vUv = uv;
            vec3 pos = position;
            float n = sin(pos.x * 2.0 + uTime) * cos(pos.y * 2.0 + uTime) * 0.6;
            pos.z += n;
            vNoise = n;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    </script>

    <script id="f-shader" type="x-shader/x-fragment">
        varying vec2 vUv;
        varying float vNoise;
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        void main() {
            vec3 color = mix(uColor1, uColor2, vNoise + 0.5);
            gl_FragColor = vec4(color, 0.18);
        }
    </script>

    <script>
        const staff = [
            { n: "Марина Игоревна Бахтина", r: "Class Director", t: "Глубокоуважаемая Марина Игоревна! Вы — мудрое сердце нашего класса. Спасибо за Вашу выдержку и материнскую заботу. Пусть эта весна принесет Вам абсолютный покой, море радости и искренней гордости за нас! С праздником!" },
            { n: "Анастасия Евгеньевна", r: "Russian Language", t: "Уважаемая Анастасия Евгеньевна! Пусть Ваша жизнь будет полна таких же красивых и светлых сюжетов, как в лучшей классической литературе. Желаем Вам весенней гармонии и только благодарных учеников!" },
            { n: "Екатерина Андреевна", r: "Mathematics", t: "С 8 Марта, Екатерина Андреевна! Желаем Вам, чтобы в сложном уравнении жизни всегда выходил результат «Счастье». Пусть весна подарит Вам неиссякаемый запас энергии и море позитива!" },
            { n: "Татьяна Васильевна", r: "Music", t: "Пусть в Вашей душе всегда звучит самая прекрасная и светлая музыка. Спасибо за ту гармонию, которую Вы дарите нам. Желаем Вам весеннего вдохновения и бесконечного счастья!" },
            { n: "Светлана Николаевна", r: "English Language", t: "Dear Светлана Николаевна! Wishing you a brilliant spring filled with joy. May your every dream come true! Thank you for the inspiration and knowledge you give us every day. Happy Women's Day!" },
            { n: "Лилия", r: "Fine Arts", t: "Уважаемая Лилия! Желаем Вам, чтобы жизнь была яркой палитрой, на которой весна рисует самые счастливые моменты. Пусть Ваше творчество продолжает вдохновлять окружающих!" },
            { n: "Дарья Владимировна", r: "Technology", t: "Уважаемая Дарья Владимировна! Поздравляем Вас с праздником! Спасибо за Ваше мастерство и умение создавать прекрасное. Желаем Вам весеннего вдохновения, радости и гармонии во всём!" }
        ];

        const girls = [
            { n: "Ангелина", t: "Ангелина, ты — душа нашего класса! Сияй, мечтай и никогда не сомневайся в своих силах. Пусть эта весна будет твоей!" },
            { n: "Айлана", t: "Айлана, с 8 Марта! Желаю тебе невероятных приключений, море улыбок и исполнения всех самых заветных желаний." },
            { n: "Мария", t: "Маша, ты замечательная. Пусть твоя жизнь будет наполнена яркими событиями и самыми крутыми новостями. С праздником!" },
            { n: "Кира", t: "Кира, будь всегда такой же стильной и уверенной. Пусть весна подарит тебе огромный заряд вдохновения!" },
            { n: "Алиса", t: "Алиса, желаю тебе весеннего волшебства! Пусть каждый день будет похож на добрую и светлую сказку." },
            { n: "Полина", t: "Полина, твоя улыбка освещает наш класс! Желаю тебе всегда оставаться таким же светлым и искренним человеком." },
            { n: "Кристина", t: "Кристина, с праздником весны! Желаю тебе быть первой во всём и наслаждаться каждым прекрасным мгновением." },
            { n: "Алена Теремова", t: "Алена, пусть весна принесет тебе много тепла и счастья. Оставайся такой же замечательной и настоящей!" },
            { n: "Полина К.", t: "Полина, с 8 Марта! Желаю тебе верных друзей, крутых подарков и самого праздничного настроения!" },
            { n: "Иванна", t: "Иванна, ты большая молодец! Желаю тебе огромных успехов во всех начинаниях и бесконечного счастья." }
        ];

        const tGrid = document.getElementById('teachers-target');
        staff.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'card-p';
            card.innerHTML = `<span class="card-index">MATVEY // ARCHIVE // 0${i+1}</span><div class="card-name">${item.n}</div><div class="card-sub">${item.r}</div>`;
            card.onclick = () => openModal(item.n, item.t);
            tGrid.appendChild(card);
        });

        const gGrid = document.getElementById('girls-target');
        girls.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'card-girl card-p';
            card.innerHTML = `<div class="card-name">${item.n}</div><div class="card-sub" style="color:var(--pink)">Diamond Student</div>`;
            card.onclick = () => openModal(item.n, item.t);
            gGrid.appendChild(card);
        });

        function openModal(n, t) {
            document.getElementById('m-name').innerText = n;
            document.getElementById('m-text').innerText = t;
            const m = document.getElementById('modal-sys');
            m.style.display = 'flex';
            gsap.to(m, { opacity: 1, duration: 0.5 });
            gsap.fromTo('.m-content', { scale: 0.9, y: 40, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.7, ease: "power4.out" });
        }

        function closeModal() {
            gsap.to('#modal-sys', { opacity: 0, duration: 0.4, onComplete: () => { document.getElementById('modal-sys').style.display = 'none'; }});
        }

        let scene, camera, renderer, globe;
        const clock = new THREE.Clock();

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const geo = new THREE.IcosahedronGeometry(15, 35);
            const mat = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('v-shader').textContent,
                fragmentShader: document.getElementById('f-shader').textContent,
                uniforms: { 
                    uTime: { value: 0 }, 
                    uColor1: { value: new THREE.Color(0x080808) }, 
                    uColor2: { value: new THREE.Color(0xe5c47a) } 
                },
                wireframe: true, transparent: true
            });
            globe = new THREE.Mesh(geo, mat);
            scene.add(globe);
            camera.position.z = 30;

            function render() {
                requestAnimationFrame(render);
                globe.material.uniforms.uTime.value = clock.getElapsedTime() * 0.4;
                globe.rotation.y += 0.0015;
                renderer.render(scene, camera);
            }
            render();
        }

        let targetScroll = 0, currentScroll = 0;
        const scrollContainer = document.getElementById('scroll-container');
        window.addEventListener('wheel', (e) => { targetScroll += e.deltaY * 0.5; }, { passive: true });
        
        let touchStart = 0;
        window.addEventListener('touchstart', (e) => { touchStart = e.touches[0].clientY; });
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0].clientY;
            targetScroll += (touchStart - touch) * 2.8;
            touchStart = touch;
        });

        function smoothScroll() {
            const max = scrollContainer.scrollHeight - window.innerHeight;
            targetScroll = Math.max(0, Math.min(targetScroll, max));
            currentScroll += (targetScroll - currentScroll) * 0.08;
            scrollContainer.style.transform = `translate3d(0, -${currentScroll}px, 0)`;
            if(globe) globe.position.y = -currentScroll * 0.012;
            requestAnimationFrame(smoothScroll);
        }

        const cursor = document.getElementById('cursor');
        window.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });

        window.addEventListener('load', () => {
            gsap.to('#progress-bar', {
                width: '100%', duration: 1.8, ease: "power2.inOut",
                onComplete: () => {
                    init3D(); smoothScroll();
                    gsap.to('#loading-screen', { 
                        yPercent: -100, duration: 1, ease: "expo.inOut", 
                        onComplete: () => {
                            document.getElementById('loading-screen').remove();
                            gsap.to('#hero-tag', { opacity: 0.5, y: -15, duration: 1 });
                            gsap.to('#hero-main', { opacity: 1, y: -20, duration: 1, delay: 0.2 });
                            gsap.to('#hero-scroll', { opacity: 1, duration: 1, delay: 0.5 });
                        }
                    });
                }
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
